# Configuration for 8-Layer Unrolled ADMM with High Noise
# Full model for challenging noise conditions

dataset:
  samples: 100000
  psf_sigma: 0.25
  exp: "superbit"
  nse_sd: 1.0e-2
  normalized: true
  seed: 42
  stamp_size: 53
  pixel_size: 0.141
  apply_psf_shear: true
  psf_shear_range: 0.05

# Model configuration
deconv:
  model_type: "unrolled_admm_8"
  n_iters: 8
  learn_hyperparams: true
  use_physics_informed: true
  z_features: [32, 64, 128, 256, 128, 64, 32]
  
# Training configuration
training:
  epochs: 350
  batch_size: 8
  learning_rate: 8.0e-4
  weight_decay: 1.0e-4
  patience: 40
  val_split: 0.2
  eval_interval: 1
  
# Evaluation configuration
evaluation:
  test_samples: 5000
  seed: 58
  
# Output configuration
output:
  save_path: null  # Will use SHEARNET_DATA_PATH/model_checkpoint if null
  plot_path: null  # Will use SHEARNET_DATA_PATH/plots if null
  model_name: "unrolled_admm_8layer_high_noise"
  
# Plotting configuration
plotting:
  plot: true
  num_plot_samples: 10