# shearnet/config/default_config.yaml
# Default configuration for ShearNet

# Dataset configuration
dataset:
  samples: 10000
  psf_fwhm: 0.25
  exp: "ideal"
  nse_sd: 1.0e-5
  seed: 42
  stamp_size: 53
  pixel_size: 0.141
  apply_psf_shear: false
  psf_shear_range: 0.05
  # Z-score standardization of the network outputs (labels: g1, g2, hlr, flux),
  # fit on the training portion only. Default true, matching historical behavior
  # (labels were always normalized). Set false to train on raw labels for the
  # label-normalization ablation; when off, an identity normalizer is saved so
  # eval and the benchmarks are unaffected.
  normalize_labels: true
  # Dataset-level input-image standardization (independent of label
  # normalization). When true, a single scalar mean/std per channel is fit on
  # the training stamps and reused at train/eval/benchmark time. Default false
  # so existing runs are unchanged; toggle for the A/B.
  normalize_images: false
  # D4 (8x) training augmentation -- ABLATION ONLY. Meaningful only for the
  # non-equivariant baselines (cnn / fork-like); a provable no-op for
  # d4-fork-like. Leave false unless running the augmentation-vs-architecture
  # ablation.
  d4_augment: false
  # Number of worker processes for dataset generation. null (default) = auto:
  # uses SLURM_CPUS_PER_TASK on a cluster, else 1 (serial) off-cluster. An
  # explicit int forces that many; 1 = serial. Uses a spawn-based pool
  # (JAX-safe, never fork). NOTE: auto reads the SLURM allocation, NOT the
  # node's total cores (os.cpu_count would oversubscribe a shared node). Output
  # is identical for any value (PSF sampling is seeded per object).
  nproc: null
  # Compute + store the 4 metacal (+/- e1/e2) reconvolved images per object.
  # Off by default; training never uses them (they only live in obs metadata).
  compute_metacal: false

# Model configuration  
model:
  process_psf: False
  type: "cnn"  # Options: mlp, cnn, resnet, forklens_psf,
               #          research_backed, fork-like, and d4-fork-like
               #          (D4-equivariant two-branch model, Lin et al. 2026)
  galaxy:
    type: "research_backed"
  psf:
    type: "forklens_psf"
  output_keys: ['g1', 'g2']
  gap: False
  fusion: "concat"  # Options: concat, transformer (fork-like / d4-fork-like only)
  
# Training configuration
training:
  epochs: 10
  batch_size: 32
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  patience: 10
  val_split: 0.2
  eval_interval: 1
  loss: "mse"  # registry name: mse, mae, huber (or one added via register_loss)
  # Exponential moving average of the weights. null = off (default, no change).
  # Set e.g. 0.999 to validate/checkpoint the averaged weights.
  ema_decay: null

# Evaluation configuration
evaluation:
  test_samples: 1000
  seed: 58
  
# Output configuration
output:
  save_path: null  # Will use SHEARNET_DATA_PATH/model_checkpoint if null
  plot_path: null  # Will use SHEARNET_DATA_PATH/plots if null
  model_name: "my_model"
  
# Plotting configuration
plotting:
  plot: true  # Whether to plot learning curves
  
# Comparison methods
comparison:
  mcal: true
  ngmix: true
  psf_model: "gauss"
  gal_model: "gauss"

catalog:
  # Path to a COSMOS catalog FITS file with G1/G2/HLR/FLUX columns. When null (or
  # the file is missing) a synthetic random catalog is used instead, so training
  # works out of the box.
  cosmos_cat_fname: null
